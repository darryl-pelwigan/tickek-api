  /api/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticateds the user and returns the user's API token"
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    token: '{YOUR_AUTH_KEY}'
                  message: Authenticated
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: '{YOUR_AUTH_KEY}'
                  message:
                    type: string
                    example: Authenticated
                  status:
                    type: integer
                    example: 200
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: javon.ziemann@example.org
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: 'Py`(OA;E}O9qD^^C{'
              required:
                - email
                - password
      security: []
  /api/logout:
